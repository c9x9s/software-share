<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE - 极客导航</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .article { max-width: 800px; margin: 0 auto; }
        .article-header { text-align: center; padding: 3rem 0; border-bottom: 1px solid var(--border-color); margin-bottom: 3rem; }
        .article-icon { font-size: 5rem; margin-bottom: 1.5rem; }
        .article-title { font-size: 2rem; margin-bottom: 1rem; }
        .article-meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; }
        .article-meta span { margin: 0 0.5rem; }
        .article-tags { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
        .tag { background: rgba(0, 212, 255, 0.1); color: var(--accent); padding: 0.3rem 1rem; border-radius: 20px; font-size: 0.8rem; }
        .article-content { line-height: 1.9; color: var(--text-secondary); }
        .article-content h2 { color: var(--text-primary); font-size: 1.4rem; margin: 2.5rem 0 1rem; }
        .article-content p { margin-bottom: 1.5rem; }
        .article-content ul { margin: 1rem 0 1.5rem 1.5rem; }
        .article-content li { margin-bottom: 0.5rem; }
        .article-content strong { color: var(--text-primary); }
        .article-content a { color: var(--accent; }
        .article-content a:hover { text-decoration: underline; }
        .highlight-box { background: var(--bg-card); border-left: 3px solid var(--accent); padding: 1.5rem; margin: 2rem 0; border-radius: 0 8px 8px 0; }
        .highlight-box h4 { color: var(--text-primary); margin-bottom: 0.5rem; }
        .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 2rem 0; }
        .pros, .cons { background: var(--bg-card); padding: 1.5rem; border-radius: 8px; }
        .pros h4 { color: #4ade80; margin-bottom: 1rem; }
        .cons h4 { color: #f87171; margin-bottom: 1rem; }
        .pros li, .cons li { margin-bottom: 0.5rem; list-style: none; }
        .pros li::before { content: "✓ "; color: #4ade80; }
        .cons li::before { content: "✗ "; color: #f87171; }
        .action-buttons { display: flex; gap: 1rem; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border-color); }
        .action-btn { flex: 1; padding: 1rem 2rem; border-radius: 8px; text-align: center; font-weight: 500; transition: var(--transition); }
        .action-btn.primary { background: var(--accent); color: var(--bg-primary); }
        .action-btn.primary:hover { background: var(--accent-hover); }
        .action-btn.secondary { border: 1px solid var(--border-color); color: var(--text-secondary); }
        .action-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
        @media (max-width: 600px) { .pros-cons { grid-template-columns: 1fr; } .action-buttons { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="../index.html" class="logo">⚡极客<span>导航</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="../dev.html">开发工具</a></li>
                    <li><a href="../design.html">设计工具</a></li>
                    <li><a href="../learning.html">学习资源</a></li>
                    <li><a href="../efficiency.html">效率工具</a></li>
                    <li><a href="../security.html">安全工具</a></li>
                    <li><a href="../cloud.html">云服务</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
        <article class="article">
            <div class="breadcrumb">
                <a href="../index.html">首页</a>
                <span>/</span>
                <a href="../CATEGORY.html">CATEGORY</a>
                <span>/</span>
                <span>NAME</span>
            </div>
            <div class="article-header">
                <div class="article-icon">ICON</div>
                <h1 class="article-title">NAME</h1>
                <div class="article-meta">
                    <span>PLATFORM</span>
                    <span>|</span>
                    <span>💰 PRICE</span>
                </div>
                <div class="article-tags">
                    TAGS
                </div>
            </div>
            <div class="article-content">
                CONTENT
            </div>
        </article>
    </main>
    <footer>
        <p>© 2024 极客导航 · 发现优质工具，提升工作效率</p>

</body>
</html>
