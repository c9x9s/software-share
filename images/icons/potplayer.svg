<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PotPlayer - Purple play triangle -->
  <!-- Rounded square background (PotPlayer icon is a rounded square with play triangle) -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#6A1B9A"/>
  <!-- Lighter purple highlight -->
  <rect x="4" y="4" width="56" height="28" rx="12" fill="#7B1FA2"/>
  <rect x="4" y="4" width="56" height="28" rx="12" fill="#8E24AA" opacity="0.5"/>
  <!-- Play triangle (pointing right) -->
  <polygon points="26,18 26,46 46,32" fill="white"/>
  <!-- Subtle shadow on triangle -->
  <polygon points="26,18 26,46 46,32" fill="white" opacity="0.9"/>
</svg>
