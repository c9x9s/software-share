<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sunlogin (向日葵/Oray) - Orange sunflower/circular compass logo -->
  <!-- Outer sun ring -->
  <circle cx="32" cy="32" r="26" fill="#FF6D00"/>
  <!-- Inner circle (lighter center) -->
  <circle cx="32" cy="32" r="18" fill="#FF8F00"/>
  <circle cx="32" cy="32" r="8" fill="#E65100"/>
  <!-- Sunflower petals (8 petals around the circle) -->
  <g fill="#FF6D00" stroke="#E65100" stroke-width="1">
    <ellipse cx="32" cy="6" rx="5" ry="8"/>
    <ellipse cx="32" cy="58" rx="5" ry="8"/>
    <ellipse cx="6" cy="32" rx="8" ry="5"/>
    <ellipse cx="58" cy="32" rx="8" ry="5"/>
    <ellipse cx="14" cy="14" rx="5" ry="8" transform="rotate(45,14,14)"/>
    <ellipse cx="50" cy="50" rx="5" ry="8" transform="rotate(45,50,50)"/>
    <ellipse cx="50" cy="14" rx="5" ry="8" transform="rotate(-45,50,14)"/>
    <ellipse cx="14" cy="50" rx="5" ry="8" transform="rotate(-45,14,50)"/>
  </g>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="#3E2723"/>
</svg>
