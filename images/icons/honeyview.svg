<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Honeyview (Bandisoft) - Orange bee/honey icon -->
  <!-- Hexagonal honeycomb background -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="#FF8F00"/>
  <polygon points="32,10 52,22 52,42 32,54 12,42 12,22" fill="#FFB300"/>
  <!-- Bee body (oval) -->
  <ellipse cx="32" cy="32" rx="12" ry="9" fill="#FDD835"/>
  <!-- Bee stripes (black) -->
  <rect x="20" y="24" width="24" height="4" rx="2" fill="#333" transform="rotate(-10,32,26)"/>
  <rect x="20" y="32" width="24" height="4" rx="2" fill="#333" transform="rotate(-10,32,34)"/>
  <rect x="20" y="40" width="24" height="4" rx="2" fill="#333" transform="rotate(-10,32,42)"/>
  <!-- Bee wings -->
  <ellipse cx="24" cy="22" rx="6" ry="4" fill="white" opacity="0.8" transform="rotate(-30,24,22)"/>
  <ellipse cx="40" cy="22" rx="6" ry="4" fill="white" opacity="0.8" transform="rotate(30,40,22)"/>
  <!-- Bee face -->
  <circle cx="28" cy="30" r="1.5" fill="#333"/>
  <circle cx="36" cy="30" r="1.5" fill="#333"/>
  <!-- Antennae -->
  <line x1="28" y1="24" x2="24" y2="16" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="40" y2="16" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="16" r="1.5" fill="#333"/>
  <circle cx="40" cy="16" r="1.5" fill="#333"/>
</svg>
