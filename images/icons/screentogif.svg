<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- ScreenToGif - Red record button / monitor icon -->
  <!-- Monitor screen -->
  <rect x="6" y="8" width="52" height="36" rx="4" fill="#424242"/>
  <!-- Screen interior -->
  <rect x="10" y="12" width="44" height="28" rx="2" fill="#1a1a2e"/>
  <!-- Red record dot (top right corner of screen) -->
  <circle cx="48" cy="18" r="5" fill="#E53935"/>
  <circle cx="48" cy="18" r="3" fill="#FF1744"/>
  <!-- Monitor stand -->
  <rect x="26" y="44" width="12" height="4" fill="#424242"/>
  <rect x="20" y="48" width="24" height="3" rx="1.5" fill="#424242"/>
  <!-- "GIF" text on screen -->
  <text x="32" y="34" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="12" fill="white" text-anchor="middle">GIF</text>
</svg>
