<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 7-Zip - Classic blue/white icon -->
  <!-- Main body of 7-Zip (rectangular with a zipper pattern on the right) -->
  <rect x="6" y="6" width="52" height="52" rx="5" fill="#1A237E"/>
  <!-- Darker edge -->
  <rect x="6" y="6" width="52" height="52" rx="5" fill="none" stroke="#0D1642" stroke-width="2"/>
  <!-- Zipper teeth (the classic 7-Zip icon has vertical teeth on right side) -->
  <rect x="42" y="6" width="16" height="52" rx="0" fill="#283593"/>
  <!-- Alternating zipper teeth -->
  <g fill="#1A237E">
    <rect x="42" y="6" width="16" height="6"/>
    <rect x="42" y="18" width="16" height="6"/>
    <rect x="42" y="30" width="16" height="6"/>
    <rect x="42" y="42" width="16" height="6"/>
  </g>
  <!-- "7" text -->
  <text x="28" y="44" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="36" fill="white" text-anchor="middle">7</text>
</svg>
