  <path d="M22 26 Q26 22 28 28 Q30 34 26 40" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M18 32 L30 32" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right side of 火 -->
  <path d="M36 22 L32 38 Q34 44 40 46" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M30 44 Q32 48 38 46" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small flame dots -->
  <circle cx="38" cy="24" r="1.5" fill="white"/>
  <circle cx="24" cy="36" r="1.5" fill="white"/>
</svg>
