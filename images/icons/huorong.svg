  <!-- Innermost lighter area -->
  <path d="M32 12 L50 20 Q50 36 44 44 Q38 50 32 54 Q26 50 20 44 Q14 36 14 20 Z" fill="#42A5F5"/>
  <!-- Chinese character "火" (fire) stylized in white -->
